<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Consolidação Legislativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-between font-sans">

    <header class="bg-blue-950 text-white shadow-md py-6">
        <div class="max-w-4xl mx-auto px-4 flex items-center gap-4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/bf/Coat_of_arms_of_Brazil.svg" class="w-12 h-12" alt="Brasão">
            <div>
                <h1 class="text-xl font-bold">Consolidador Automatizado de Atos</h1>
                <p class="text-xs text-blue-200 uppercase tracking-widest font-semibold">Padrão Unificado de Engenharia Documental</p>
            </div>
        </div>
    </header>

    <main class="max-w-3xl w-full mx-auto p-4 flex-grow my-8">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
            <h2 class="text-lg font-bold text-gray-800 mb-6 border-b pb-2">Vínculos e Relacionamentos dos Documentos</h2>
            
            <form method="POST" class="space-y-6">
                <div class="space-y-3 bg-gray-50 p-4 rounded-lg border border-gray-100">
                    <h3 class="text-sm font-bold text-blue-900 uppercase tracking-wider">1. Dados do Acto Original</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Identificação do Ato Original</label>
                            <input type="text" name="ato_original" placeholder="Ex: Portaria nº 130/PGJM, de 28/06/2022" required
                                   class="w-full rounded border-gray-300 p-2 text-sm border focus:outline-blue-900">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Link de Publicação Oficial (SEI)</label>
                            <input type="url" name="link_original" placeholder="https://sei.mpm.mp.br/..." required
                                   class="w-full rounded border-gray-300 p-2 text-sm border focus:outline-blue-900">
                        </div>
                    </div>
                </div>

                <div class="space-y-3 bg-gray-50 p-4 rounded-lg border border-gray-100">
                    <h3 class="text-sm font-bold text-blue-900 uppercase tracking-wider">2. Dados do Ato Derivativo (Modificador)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Identificação do Ato Derivativo</label>
                            <input type="text" name="ato_derivativo" placeholder="Ex: Portaria nº 103/PGJM, de 21/05/2026" required
                                   class="w-full rounded border-gray-300 p-2 text-sm border focus:outline-blue-900">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">Link de Publicação Oficial (SEI)</label>
                            <input type="url" name="link_derivativo" placeholder="https://sei.mpm.mp.br/..." required
                                   class="w-full rounded border-gray-300 p-2 text-sm border focus:outline-blue-900">
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700">3. Escolha o Modelo do Arquivo Final</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="flex items-center gap-3 bg-white border p-4 rounded-lg cursor-pointer hover:bg-gray-50 transition shadow-sm">
                            <input type="radio" name="tipo_versao" value="consolidada" checked class="h-4 w-4 text-blue-900">
                            <div>
                                <p class="text-sm font-bold text-gray-800">Versão Consolidada</p>
                                <p class="text-xs text-gray-500">Texto limpo e vigente com notas de alteração.</p>
                            </div>
                        </label>
                        <label class="flex items-center gap-3 bg-white border p-4 rounded-lg cursor-pointer hover:bg-gray-50 transition shadow-sm">
                            <input type="radio" name="tipo_versao" value="alterada" class="h-4 w-4 text-blue-900">
                            <div>
                                <p class="text-sm font-bold text-gray-800">Versão Alterada</p>
                                <p class="text-xs text-gray-500">Texto histórico com tachados em vermelho.</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-blue-950 hover:bg-blue-900 text-white font-bold py-3 px-4 rounded shadow transition duration-150">
                        Processar e Gerar Arquivo .HTML Oficial
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-gray-100 border-t border-gray-200 text-center py-4 text-xs text-gray-500">
        Desenvolvido sob as diretrizes de simetria gráfica e conformidade com a LC 95/98.
    </footer>

</body>
</html>
